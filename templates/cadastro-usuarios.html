<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários | EHS CONECT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { background: #212529; min-height: 100vh; color: white; }
        .nav-link { color: #adb5bd; padding: 15px; border-bottom: 1px solid #373b3e; text-decoration: none; display: block; }
        .nav-link:hover { color: white; background: #373b3e; }
        .btn-inicio { background: #212529; color: white; padding: 15px; display: block; text-align: center; text-decoration: none; border-bottom: 1px solid #373b3e; font-weight: bold; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar p-0">
            <a href="/dashboard" class="btn-inicio"><i class="fas fa-arrow-left me-2"></i> Voltar ao Painel</a>
            <ul class="nav flex-column mt-2">
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-users-cog me-2"></i> Usuários</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-building me-2"></i> Empresas</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-user-friends me-2"></i> Colaboradores</a></li>
            </ul>
        </nav>

        <!-- Conteúdo Principal -->
        <main class="col-md-10 p-4">
            <h2 class="mb-4">Gestão de Usuários</h2>

            <!-- Formulário de Cadastro -->
            <div class="card p-4 mb-4">
                <h5 class="mb-3"><i class="fas fa-user-plus"></i> Novo Usuário</h5>
                <form action="/cadastrar-usuario" method="POST" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">E-mail (Login/Recuperação)</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Perfil de Acesso</label>
                        <select name="perfil" class="form-select">
                            <option value="admin">Administrador</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="user">Operacional</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Salvar Usuário</button>
                    </div>
                </form>
            </div>

            <!-- Tabela de Histórico -->
            <div class="card p-4">
                <h5 class="mb-3"><i class="fas fa-list"></i> Usuários Cadastrados</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Perfil</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Administrador</td>
                                <td>admin@ehsconect.com.br</td>
                                <td>Administrador</td>
                                <td><span class="badge bg-success">Ativo</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-danger">Desativar</button>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

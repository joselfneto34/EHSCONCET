<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa | EHS CONECT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 10px; }
        .btn-primary { background-color: #1a4d6c; border: none; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card p-4 shadow-sm mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-primary"><i class="fas fa-building"></i> Cadastro de Empresa</h3>
            <a href="/dashboard" class="btn btn-outline-secondary"><i class="fas fa-home"></i> Voltar ao Dashboard</a>
        </div>
        
        <form action="/cadastro-empresa" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Razão Social</label>
                    <input type="text" name="razao_social" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nome Fantasia</label>
                    <input type="text" name="nome_fantasia" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">CNPJ ou CPF</label>
                    <input type="text" name="identificacao" class="form-control" placeholder="00.000.000/0000-00" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">CNAE</label>
                    <input type="text" name="cnae" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Grau de Risco</label>
                    <select name="grau_risco" class="form-select">
                        <option value="1">Grau 1</option>
                        <option value="2">Grau 2</option>
                        <option value="3">Grau 3</option>
                        <option value="4">Grau 4</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Endereço Completo</label>
                    <input type="text" name="endereco" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-12 mt-4 text-end">
                    <button type="reset" class="btn btn-secondary px-4">Limpar</button>
                    <button type="submit" class="btn btn-primary px-4">Salvar Cadastro</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-4 shadow-sm">
        <h5 class="mb-3"><i class="fas fa-list"></i> Empresas Cadastradas</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Razão Social</th>
                        <th>CNPJ/CPF</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>EHS CONECT LTDA</td>
                        <td>00.000.000/0001-00</td>
                        <td><span class="badge bg-success">Ativa</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger">Desativar</button>
                            <button class="btn btn-sm btn-outline-primary">Editar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

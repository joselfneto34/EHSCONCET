<html lang="pt-br">

<head>

```
<meta charset="UTF-8">

      href="{{ url_for('static', filename='css/login.css') }}">

<div class="login-container">

```
<img src="{{ url_for('static', filename='img/logo.png') }}"

<p>Sistema de Gestão de SST</p>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="E-mail"

    <input
        type="password"
        name="senha"
        placeholder="Senha"
        required>

    <button type="submit">

    </button>

<a href="#">

</a>

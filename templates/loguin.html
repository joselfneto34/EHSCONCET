<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EHS CONECT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        .login-container { display: flex; height: 100%; }
        
        /* Lado esquerdo: Branding com Logo */
        .brand-side { 
            flex: 1; 
            background: #1a4d6c; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 40px;
        }
        .brand-side img { width: 250px; margin-bottom: 20px; }
        .logo-text { font-size: 2.5rem; font-weight: 700; margin-bottom: 0; }
        .logo-text span { color: #34aadc; }
        
        /* Mensagem de Boas-vindas */
        .welcome-msg { 
            margin-top: 30px; 
            padding: 20px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.6; 
            opacity: 0.9;
            max-width: 80%;
        }
        
        /* Lado direito: Login */
        .form-side { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #f8f9fa;
            padding: 40px;
        }
        .login-card { width: 100%; max-width: 400px; border-radius: 15px; }
        .btn-primary { background-color: #1a4d6c; border: none; }
        .btn-primary:hover { background-color: #113349; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-side">
            <img src="{{ url_for('static', filename='logo2026.png') }}" alt="Logo EHS CONECT">
            <h1 class="logo-text">EHS<span>CONECT</span></h1>
            <p class="lead">Gestão de Segurança e Saúde Ocupacional</p>
            
            <div class="welcome-msg">
                <p>Seja bem-vindo ao <strong>EHS CONECT</strong>, de agora em diante a sua gestão será automatizada e facilitada, agradecemos a utilização do nosso sistema.</p>
                <p><strong>Tenha um ótimo trabalho!</strong></p>
            </div>
        </div>

        <div class="form-side">
            <div class="card p-4 shadow-sm login-card">
                <h3 class="mb-4 text-center text-primary">Acesso ao Sistema</h3>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
